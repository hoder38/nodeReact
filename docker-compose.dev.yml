name: anomopi-dev
services:
  redis:
    build:
      context: .
      dockerfile: redis.Dockerfile
    image: nodereact-redis:v1.0
    container_name: redis
    env_file: .env.dev
    volumes:
      - /mnt/dev/redis:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: redis-server /etc/redis/redis.conf --requirepass ${SESS_PWD}
    restart: no
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SESS_PWD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    build:
      context: .
      dockerfile: mongodb.Dockerfile
    image: nodereact-mongodb:v1.0
    container_name: mongodb
    env_file: .env.dev
    volumes:
      - /mnt/dev/mongodb:/data/db
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    command: mongod --config /etc/mongo/mongod.conf
    restart: no
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PWD}
      MONGO_INITDB_DATABASE: ${DB_USERNAME}
    healthcheck:
      test: test $$(echo "db.version()" | mongo --port 27017 --quiet)
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    image: nodereact-nginx:v1.0
    container_name: nginx-proxy
    ports:
      - "8080:443" # Map host 8080 to Nginx container 8080
      - "8081:80"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /mnt/dev/storage:/mnt/storage:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - reactnode-file-server
      - reactnode-server
    networks:
      default:
        aliases:
          - www.anomopi.com
    restart: no

  reactnode-file-server:
    build:
      context: .
      dockerfile: reactnode-file-server.Dockerfile
    image: reactnode-file-server:v1.0
    container_name: reactnode-file-server
    env_file: .env.dev
    environment:
      - TZ=Asia/Taipei
    expose:
      - "3390"
      - "3391" # Expose internally for Nginx to access
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /mnt/dev/tmp:/mnt/tmp
      - /mnt/dev/storage:/mnt/storage
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: no

  reactnode-server:
    build:
      context: .
      dockerfile: reactnode-server.Dockerfile
    image: reactnode-server:v1.0
    container_name: reactnode-server
    env_file: .env.dev
    environment:
      - TZ=Asia/Taipei
    expose:
      - "3389" # Expose internally for Nginx to access
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /mnt/dev/tmp:/mnt/tmp
      - /mnt/dev/storage:/mnt/storage:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./src:/app/src
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: no

  e2e:
    build:
      context: .
      dockerfile: e2e.Dockerfile
    image: nodereact-e2e:v1.0
    container_name: reactnode-e2e
    environment:
      - PLAYWRIGHT_BASE_URL=https://www.anomopi.com:443
    volumes:
      - ./e2e:/app/e2e
    depends_on:
      - nginx
    profiles:
      - e2e
    restart: no
