services:
  redis:
    build:
      context: .
      dockerfile: redis.Dockerfile
    container_name: redis
    env_file: .env
    volumes:
      - /mnt/redis-docker:/data
    command: redis-server /etc/redis/redis.conf --requirepass ${SESS_PWD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SESS_PWD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    build:
      context: .
      dockerfile: mongodb.Dockerfile
    container_name: mongodb
    env_file: .env
    volumes:
      - /mnt/mongodb-docker:/data/db
    command: mongod --config /etc/mongo/mongod.conf
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PWD}
      MONGO_INITDB_DATABASE: ${DB_USERNAME}
    healthcheck:
      test: test $$(echo "db.version()" | mongo --port 27017 --quiet)
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    container_name: nginx-proxy
    ports:
      - "8080:8080" # Map host 8080 to Nginx container 8080
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /mnt/storage:/mnt/storage:ro
    restart: unless-stopped

  reactnode-file-server:
    build:
      context: .
      dockerfile: reactnode-file-server.Dockerfile
    container_name: reactnode-file-server
    env_file: .env
    expose:
      - "8083"
      - "8084" # Expose internally for Nginx to access
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /mnt/tmp_dev:/mnt/tmp
      - /mnt/storage:/mnt/storage
      - .:/app/
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  reactnode-server:
    build:
      context: .
      dockerfile: reactnode-server.Dockerfile
    container_name: reactnode-server
    env_file: .env
    expose:
      - "8082" # Expose internally for Nginx to access
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /mnt/tmp_dev:/mnt/tmp
      - /mnt/storage:/mnt/storage
      - .:/app/
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

